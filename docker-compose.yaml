services:

  # ── Streamlit underwriter dashboard ────────────────────────────────────────
  sa-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./artifacts:/app/artifacts:rw
    command:
      - python
      - -m
      - streamlit
      - run
      - ui/dashboard.py
      - --server.address=0.0.0.0
      - --server.port=8501
    depends_on:
      - redis

  # ── FastAPI micro-service (async run_application) ──────────────────────────
  sa-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./artifacts:/app/artifacts:rw
    command:
      - python
      - -m
      - uvicorn
      - api.main:app
      - --host=0.0.0.0
      - --port=8000
    depends_on:
      - redis
    profiles:
      - api

  # ── Redis (session / event cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis_data:
